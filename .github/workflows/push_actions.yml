name: Push actions
on: [push, workflow_dispatch]
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Install node
              uses: actions/setup-node@v6
              with:
                node-version: '18'
            - name: Install dependencies
              run: npm ci
            - name: Run lint script
              run: npm run lint
    test:
        needs: lint
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Install node
              uses: actions/setup-node@v6
              with:
                node-version: '18'
            - name: Install dependencies
              run: npm ci
            - name: Run test script
              run: npm run test
    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Install node
              uses: actions/setup-node@v6
              with:
                node-version: '18'
            - name: Install dependencies
              run: npm ci
            - name: Build script
              run: npm run build
    

            